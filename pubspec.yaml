name: alertcontacts
description: "A new Flutter project."
publish_to: 'none'
version: 3.1.2+38

environment:
  sdk: ^3.8.0

dependencies:
  equatable: ^2.0.7
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^19.4.2
  geocoding: ^3.0.0
  go_router: ^16.3.0
  google_maps_flutter: ^2.14.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.3
  share_plus: ^10.1.2
  firebase_auth: ^6.1.2
  google_sign_in: ^6.2.1
  http: ^1.2.2
  provider: ^6.1.5+1
  vibration: ^2.0.0
  flutter_tts: ^4.2.0
  device_info_plus: ^11.1.0
  package_info_plus: ^9.0.0
  battery_plus: ^7.0.0
  connectivity_plus: ^7.0.0
  version: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/illustrations/
    - assets/icons/